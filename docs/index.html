<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, orientation=portrait">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Intractive_Amoeba</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        /* Force portrait mode with black bars if needed */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        #unity-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #unity-canvas {
            /* Force 9:16 aspect ratio regardless of screen size */
            aspect-ratio: 9/16;
            height: auto;
            max-height: 100vh;
            max-width: 100vw;
            background-color: #000;
        }

        /* Adjust loading bar position */
        #unity-loading-bar {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Footer positioning */
        #unity-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        /* Add this to your style section */
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

            #orientation-warning img {
                width: 64px;
                height: 64px;
                margin-bottom: 20px;
                animation: rotate 2s infinite;
            }

        /* For desktop users */
        #desktop-portrait-mode {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 998;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        #desktop-continue-button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 20px 2px;
            cursor: pointer;
            border-radius: 4px;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(-90deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }
    </style>
</head>
<body>
    <!-- Add this warning element -->
    <div id="orientation-warning">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0id2hpdGUiIGQ9Ik00IDIwaDEwVjRINHYxNnptMiAySDIwVjhoLTEydjE0aC0yVjIwaC0yVjJoMTh2MjAtMmgtMnoiLz48L3N2Zz4=" alt="Rotate Device">
        <h2>Please rotate your device</h2>
        <p>This game works best in portrait mode</p>
    </div>

    <!-- Add this for desktop users -->
    <div id="desktop-portrait-mode">
        <h2>Portrait Mode Required</h2>
        <p>This application is designed for portrait mode viewing.</p>
        <p>For the best experience on desktop:</p>
        <ul style="text-align: left; display: inline-block;">
            <li>Use a narrow browser window</li>
            <li>Or use developer tools (F12) and select a mobile device</li>
        </ul>
        <button id="desktop-continue-button">Continue Anyway</button>
    </div>

    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width=540 height=960 tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"> </div>
        <div id="unity-footer">
            <div id="unity-webgl-logo"></div>
            <div id="unity-fullscreen-button"></div>
            <div id="unity-build-title">Intractive_Amoeba</div>
        </div>
    </div>
    <script>
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var fullscreenButton = document.querySelector("#unity-fullscreen-button");
        var warningBanner = document.querySelector("#unity-warning");
        var orientationWarning = document.getElementById('orientation-warning');
        var desktopPortraitMode = document.getElementById('desktop-portrait-mode');
        var desktopContinueButton = document.getElementById('desktop-continue-button');
        var isDesktopMode = !(/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent));

        // Force portrait orientation and maintain aspect ratio
        function maintainAspectRatio() {
            var windowWidth = window.innerWidth;
            var windowHeight = window.innerHeight;
            var aspectRatio = 9 / 16;  // Portrait aspect ratio (width/height)

            var targetHeight = windowHeight;
            var targetWidth = targetHeight * aspectRatio;

            if (targetWidth > windowWidth) {
                targetWidth = windowWidth;
                targetHeight = targetWidth / aspectRatio;
            }

            canvas.style.width = targetWidth + "px";
            canvas.style.height = targetHeight + "px";
        }

        // Call on load and resize
        window.addEventListener('resize', maintainAspectRatio);
        window.addEventListener('orientationchange', maintainAspectRatio);

        // Suppress Unity's warning banner
        function unityShowBanner(msg, type) {
            // Only show critical errors
            if (type == 'error') {
                var div = document.createElement('div');
                div.innerHTML = msg;
                warningBanner.appendChild(div);
                div.style = 'background: red; padding: 10px;';
                warningBanner.style.display = 'block';
            }
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/docs.loader.js";
        var config = {
            dataUrl: buildUrl + "/docs.data.unityweb",
            frameworkUrl: buildUrl + "/docs.framework.js.unityweb",
            codeUrl: buildUrl + "/docs.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Intractive_Amoeba",
            productVersion: "1.0",
            showBanner: unityShowBanner,
        };

        // Force portrait orientation for all devices
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, orientation=portrait';
            document.getElementsByTagName('head')[0].appendChild(meta);
            container.className = "unity-mobile";
            canvas.className = "unity-mobile";
        } else {
            // For desktop, show the portrait mode message
            desktopPortraitMode.style.display = 'flex';
            canvas.style.visibility = 'hidden';
        }

        // Desktop continue button
        desktopContinueButton.addEventListener('click', function () {
            desktopPortraitMode.style.display = 'none';
            canvas.style.visibility = 'visible';
            maintainAspectRatio();
        });

        // Call once on page load
        maintainAspectRatio();

        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                loadingBar.style.display = "none";
                fullscreenButton.onclick = () => {
                    unityInstance.SetFullscreen(1);
                    // Re-enforce aspect ratio after fullscreen
                    setTimeout(maintainAspectRatio, 100);
                };
                // Call once more after game loads
                maintainAspectRatio();

                // Store Unity instance for communication
                window.unityInstance = unityInstance;
            }).catch((message) => {
                alert(message);
            });
        };

        function checkOrientation() {
            // Only check orientation on mobile devices
            if (!isDesktopMode) {
                if (window.innerWidth > window.innerHeight) {
                    // Landscape orientation
                    orientationWarning.style.display = 'flex';
                    canvas.style.visibility = 'hidden';
                } else {
                    // Portrait orientation
                    orientationWarning.style.display = 'none';
                    canvas.style.visibility = 'visible';
                }
            }
        }

        // Try to lock the screen orientation to portrait
        function lockOrientation() {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(function (error) {
                    console.log('Screen orientation lock failed: ', error);
                });
            }
        }

        // Call on load, resize and orientation change
        window.addEventListener('load', function () {
            checkOrientation();
            lockOrientation();
            maintainAspectRatio();
        });
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', function () {
            checkOrientation();
            setTimeout(maintainAspectRatio, 100);
        });

        document.body.appendChild(script);
    </script>
</body>
</html>
